<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Our Wildlife</title>
</head>
<body>

  <h1>Save Our Wildlife</h1>

  <video id="wildlifeVideo" controls width="640">
    <source src="wildlife.MP4" type="video/MP4">
    Your browser does not support the video tag.
  </video>

  <p>
    Protect wildlife by conserving habitats and protecting endangered species for future generations.
  </p>

  <button id="videoToggleBtn" onclick="toggleVideo()">Play / Hide Video</button>

  <script>
    function toggleVideo() {
      const video = document.getElementById("wildlifeVideo");
      const button = document.getElementById("videoToggleBtn");

      if (video.style.display === "none") {
        video.style.display = "block";
        video.play();
        button.textContent = "Pause Video";
      } else if (video.paused) {
        video.play();
        button.textContent = "Pause Video";
      } else {
        video.pause();
        video.style.display = "none";
        button.textContent = "Play Video";
      }
    }
  </script>

</body>
</html>
